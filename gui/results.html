<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crawled Files – Results</title>
    <link rel="stylesheet" href="/services/hub-flask/static/css/styles.css"/>
    <link rel="stylesheet" href="/services/hub-flask/static/css/check.css"/>
    <link rel="stylesheet" href="/services/hub-flask/static/css/navigation.css"/>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1 class="title">Crawled Files</h1>
        <img class="logo" src="thu_logo.png" alt="THU logo" />
      </header>

      <section class="panel">
        <div id="navigation">
        </div>
        <div class="results-header">
          <h2>Results</h2>
          <form class="results-actions" action="/services/hub-flask/export-results" method="post">
            <div class="results-toolbar">
              <label for="export-format">Format</label>
              <select id="export-format" name="format">
                <option value="csv">CSV</option>
                <option value="xlsx">Excel (.xlsx)</option>
              </select>
            </div>
            <button type="submit" class="primary">Export results</button>
          </form>
        </div>

        <div class="results-table-container">
          <table id="results-table">
            
          </table>
        </div>
      </section>
    </main>
    <script src="/services/hub-flask/static/js/navigation.js"></script>
  </body>
</html>

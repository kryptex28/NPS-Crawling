<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crawled Files – Results</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1 class="title">Crawled Files</h1>
        <img class="logo" src="thu_logo.png" alt="THU logo" />
      </header>

      <section class="panel">
        <div class="results-header">
          <h2>Results</h2>
          <div class="results-actions">
            <div class="results-toolbar">
              <label for="export-format">Format</label>
              <select id="export-format">
                <option value="csv">CSV</option>
                <option value="xlsx">Excel (.xlsx)</option>
              </select>
            </div>
            <button type="button" class="primary">Export results</button>
            <a class="ghost button-link" href="/">Back to search</a>
          </div>
        </div>

        <div class="results-table">
          <table>
            <thead>
              <tr>
                <th>Filing ID</th>
                <th>CIK</th>
                <th>Company</th>
                <th>URL</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Placeholder</td>
                <td>Placeholder</td>
                <td>Placeholder</td>
                <td>Placeholder</td>
                <td>Placeholder</td>
              </tr>
              <tr>
                <td>Placeholder</td>
                <td>Placeholder</td>
                <td>Placeholder</td>
                <td>Placeholder</td>
                <td>Placeholder</td>
              </tr>
              <tr>
                <td>Placeholder</td>
                <td>Placeholder</td>
                <td>Placeholder</td>
                <td>Placeholder</td>
                <td>Placeholder</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>

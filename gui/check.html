<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Check for New Files</title>
    <link rel="stylesheet" href="/services/hub-flask/static/css/styles.css"/>
    <link rel="stylesheet" href="/services/hub-flask/static/css/check.css"/>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1 class="title">Check for New Files</h1>
        <img class="logo" src="thu_logo.png" alt="THU logo" />
      </header>

      <section class="panel">
        <div id="crawl-control">
          <button type="button" id="start-crawl" class="primary"">Start new crawl</button>
          <button type="button" id="stop-crawl" class="ghost" disabled>Stop crawl</button>
          <button type="button" id="clear-results" class="ghost">Clear results</button>
        </div>
        <div class="status-block">
          <div class="spinner" aria-hidden="true"></div>
          <p class="status-text">The search has started. This may take some time. Please keep this window open until the process completes.</p>
        </div>
        <div id="filing-display-control">
          <div>
            <span id="element-count">Elements: 0</span>
          </div>
          <div class="paging-control" id="paging-control">
            <button id="paging-prev" disabled>&#8592; Prev</button>
            <span id="paging-info">Page 1 of 1</span>
            <button id="paging-next">Next &#8594;</button>
          </div>
          <div class="segmented-control" role="group" aria-label="Items per page">
            <label>
              <input type="radio" name="elements" value="10"> <span>10</span>
            </label>
            <label>
              <input type="radio" name="elements" value="25"> <span>25</span>
            </label>
            <label>
              <input type="radio" name="elements" value="100" checked> <span>100</span>
            </label>
            <label>
              <input type="radio" name="elements" value="1000" checked> <span>1000</span>
            </label>
            <label>
              <input type="radio" name="elements" value="10000" checked> <span>10000</span>
            </label>
          </div>
        </div>
        <div class="status-complete" id="status-complete" hidden>
          <p>Process completed. Duration: 00:10. Newly crawled files: 12.</p>
          <div class="form-actions">
            <a class="primary button-link" href="/results">Show results</a>
            <a class="ghost button-link" href="/">Back to search</a>
          </div>
        </div>
        <div class="results-list" id="results-list"></div>
      </section>
    </main>
    <script src="/services/hub-flask/static/js/check.js"></script>
  </body>
</html>
